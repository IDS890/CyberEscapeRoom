<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Operations Map</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="app-container">
    <div class="main-content">
        <div class="hud-bar">
            <a th:href="@{/dashboard}" class="btn text-btn" style="font-size: 0.9rem;">← Back to Main Dashboard</a>
            <div style="display: flex; gap: 20px;">
                <div class="hud-item">💰 <span th:text="${state.coins}">0</span></div>
                <div class="hud-item">🔥 Streak: <span th:text="${state.streak}">0</span></div>
            </div>
        </div>

        <div class="content-area" style="text-align: center;">
            <h1 style="color: var(--text-main); margin-bottom: 10px;">TACTICAL MISSION MAP</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Select an available sector node to initialize your investigation.</p>

            <div class="classic-map-grid">
                <div th:each="i : ${#numbers.sequence(1, 10)}" class="map-node-wrapper">

                    <a th:if="${i <= state.completedSectors + 1}"
                       th:href="@{/challenge/{id}(id=${i})}"
                       th:classappend="${i == state.completedSectors + 1} ? 'active-pulse' : ''"
                       class="sector-node unlocked">
                        <div class="node-number" th:text="${i}">1</div>
                        <div class="node-status">AVAILABLE</div>
                    </a>

                    <div th:unless="${i <= state.completedSectors + 1}" class="sector-node locked">
                        <div class="node-number">🔒</div>
                        <div class="node-status" style="color: var(--text-muted);">LOCKED</div>
                    </div>

                    <div class="node-label" th:text="'SECTOR 0' + ${i}">SECTOR 01</div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
