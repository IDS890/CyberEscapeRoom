<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>System Access Required</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="popup-blur-bg">

<div class="cyber-popup-box animate-scale-up">
    <div class="popup-header">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
        <span class="popup-title">SECURE_AUTH_v2.6.exe</span>
    </div>

    <div class="popup-body">
        <h2 style="color: var(--primary); margin-bottom: 10px;">Access Restricted</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">
            Enter your operational handle below to provision your session token.
        </p>

        <form th:action="@{/join}" method="post">
            <div class="input-wrapper">
                <span class="input-prompt">></span>
                <input type="text" name="playerName" class="popup-input" placeholder="Hacker Handle..." required autocomplete="off" autofocus>
            </div>
            <button type="submit" class="btn popup-submit-btn">Initialize Connection</button>
        </form>
    </div>
</div>

</body>
</html>
